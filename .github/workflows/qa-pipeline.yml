name: QA Pipeline — Playwright + Screenplay

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1-5'   # Lunes a viernes 6am — regression diaria

env:
  NODE_VERSION: '20'
  BASE_URL: 'https://reqres.in'

# ─── Quality Gates ─────────────────────────────────────────────────────────────
# - 100% pass rate en tests de API y Regression
# - TypeScript sin errores de tipo (tsc --noEmit)
# - ESLint sin errores
# - Allure report publicado en cada run
# ───────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Job 1: Static analysis ────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ── Job 2: API Tests ──────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npx playwright test tests/api --reporter=github,json,allure-playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            reports/allure-results/
            reports/test-results.json
          retention-days: 30

  # ── Job 3: Regression Suite ───────────────────────────────────────────────
  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npx playwright test tests/regression --reporter=github,json,allure-playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: reports/allure-results/
          retention-days: 30

  # ── Job 4: Quality Gate Evaluation ───────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, regression]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: reports/

      - name: Evaluate quality gate
        run: |
          echo "=== QUALITY GATE EVALUATION ==="
          
          if [ -f "reports/test-results.json" ]; then
            TOTAL=$(cat reports/test-results.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('stats',{}).get('expected',0))" 2>/dev/null || echo "0")
            FAILED=$(cat reports/test-results.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('stats',{}).get('unexpected',0))" 2>/dev/null || echo "0")
            
            echo "Total tests : $TOTAL"
            echo "Failed tests: $FAILED"
            
            if [ "$FAILED" -gt "0" ]; then
              echo "❌ QUALITY GATE FAILED — $FAILED test(s) failed"
              echo "Policy: Zero tolerance for failures on main/develop"
              exit 1
            else
              echo "✅ QUALITY GATE PASSED — All tests passed"
            fi
          else
            echo "⚠️  No test results file found — treating as failure"
            exit 1
          fi

  # ── Job 5: Publish Allure Report ─────────────────────────────────────────
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Setup Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate reports/api-test-results reports/regression-results -o allure-report --clean
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports
